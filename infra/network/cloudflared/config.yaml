tunnel: homelab
credentials-file: /vault/secrets/credentials.json
metrics: 0.0.0.0:2000
no-autoupdate: true

warp-routing:
  enabled: true

ingress:
  - hostname: "idm.sudoceo.com"
    service: https://traefik-external.traefik-external.svc.cluster.local:443
    originRequest:
      originServerName: "idm.sudoceo.com"
  - hostname: sudoceo.com
    service: https://traefik-external.traefik-external.svc.cluster.local:443
    originRequest:
      originServerName: sudoceo.com
  - service: http_status:404