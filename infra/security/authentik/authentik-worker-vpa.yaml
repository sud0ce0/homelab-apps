apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: authentik-worker-vpa
  namespace: authentik
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind:       Deployment
    name:       authentik-worker
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: '*'
      minAllowed:
        cpu: 250m
        memory: 256Mi
      maxAllowed:
        cpu: 2000m
        memory: 2048Mi
      controlledResources: ["cpu", "memory"]